<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stimulation</title>
  <style>
    :root{
      --bg:#090d15;
      --panel:rgba(14,18,26,.88);
      --panel2:rgba(18,24,35,.94);
      --text:#f6f8fb;
      --muted:#9aa5b5;
      --line:rgba(255,255,255,.08);
      --accent:#7c5cff;
      --accent2:#00d4ff;
      --good:#00e676;
      --warn:#ffcc00;
      --danger:#ff5c7a;
      --shadow:0 24px 60px rgba(0,0,0,.45);
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      min-height:100%;
      background:
        radial-gradient(circle at top,#161d2a 0,#0b111a 52%,#05070b 100%);
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.16;
      background-image:
        linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
      background-size:54px 54px;
      mask-image:radial-gradient(circle at center,black 34%,transparent 95%);
    }

    .app{
      min-height:100vh;
      padding:22px;
      position:relative;
    }

    .topbar{
      max-width:1160px;
      margin:0 auto 16px;
      display:flex;
      justify-content:space-between;
      gap:16px;
      align-items:center;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:240px;
    }

    .logo{
      width:46px;height:46px;border-radius:14px;
      display:grid;place-items:center;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      font-size:24px;
      box-shadow:var(--shadow);
    }

    h1{
      margin:0;
      font-size:clamp(22px,2.5vw,34px);
      letter-spacing:-.02em;
    }

    .sub{
      margin:4px 0 0;
      color:var(--muted);
      font-size:13px;
    }

    .stats{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .chip{
      padding:9px 13px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid var(--line);
      font-weight:800;
      backdrop-filter:blur(10px);
      font-size:13px;
    }

    .shell{
      max-width:1160px;
      margin:0 auto;
      display:grid;
      grid-template-columns:minmax(0,1fr) 0;
      gap:18px;
      align-items:start;
      transition:grid-template-columns .35s ease;
    }

    .shell.show-side{
      grid-template-columns:minmax(0,1fr) 320px;
    }

    .stage{
      position:relative;
      min-height:calc(100vh - 122px);
      border-radius:24px;
      background:rgba(9,13,20,.18);
      overflow:hidden;
    }

    .mainCard{
      min-height:calc(100vh - 122px);
      border-radius:24px;
      background:transparent;
      position:relative;
      overflow:hidden;
    }

    .center{
      min-height:calc(100vh - 122px);
      display:grid;
      place-items:center;
      padding:24px 18px 34px;
      position:relative;
    }

    .clicker{
      width:min(76vw,350px);
      aspect-ratio:1/1;
      border:none;
      border-radius:34px;
      cursor:pointer;
      user-select:none;
      font-weight:1000;
      color:#111;
      font-size:clamp(44px,8vw,68px);
      background:linear-gradient(135deg,#ff6b6b,#ffb86b 55%,#ffd93d);
      box-shadow:0 18px 50px rgba(255,131,87,.42), inset 0 -10px 20px rgba(0,0,0,.15);
      transition:transform .08s ease,filter .2s ease;
      z-index:3;
    }

    .clicker:hover{filter:saturate(1.1) brightness(1.03)}
    .clicker:active{transform:scale(.97) rotate(-1deg)}

    .hint{
      margin-top:14px;
      color:var(--muted);
      text-align:center;
      font-size:14px;
      letter-spacing:.01em;
      min-height:20px;
    }

    .floaters,.dvdLayer,.chaosLayer,.overlayLayer,.titleLayer{
      position:absolute;
      inset:0;
      pointer-events:none;
    }

    .floater{
      position:absolute;
      font-weight:900;
      font-size:18px;
      opacity:0;
      animation:rise 1.04s ease-out forwards;
      text-shadow:0 2px 10px rgba(0,0,0,.4);
    }

    @keyframes rise{
      0%{transform:translateY(0) scale(.9);opacity:0}
      20%{opacity:1}
      100%{transform:translateY(-110px) scale(1.15);opacity:0}
    }

    .miniBar{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      bottom:16px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
      z-index:2;
      width:min(92vw,680px);
    }

    .miniCard{
      padding:12px 14px;
      border-radius:16px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      color:#dbe5f2;
      backdrop-filter:blur(12px);
      font-size:13px;
      min-width:150px;
      text-align:center;
    }

    .meter{
      height:13px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      overflow:hidden;
      margin-top:9px;
    }

    .bar{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,var(--good),var(--accent2));
      transition:width .16s ease;
    }

    .sidePanel{
      position:sticky;
      top:22px;
      align-self:start;
      display:none;
      padding:18px;
      border-radius:24px;
      background:var(--panel);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      backdrop-filter:blur(14px);
      max-height:calc(100vh - 44px);
      overflow:auto;
    }

    .sidePanel.show{display:block}
    .panelTitle{margin:0 0 10px;font-size:18px}
    .panelGroup{display:grid;gap:10px}

    .upgrade{
      padding:13px;
      border-radius:16px;
      background:var(--panel2);
      border:1px solid var(--line);
    }

    .upgrade h3{
      margin:0 0 4px;
      font-size:15px;
    }

    .upgrade p{
      margin:0 0 11px;
      color:var(--muted);
      font-size:12px;
      line-height:1.35;
    }

    .buy{
      width:100%;
      border:none;
      border-radius:13px;
      padding:11px 13px;
      font-weight:900;
      color:#08111b;
      background:linear-gradient(135deg,var(--accent2),#8cfffb);
      cursor:pointer;
    }

    .buy:disabled{
      opacity:.42;
      cursor:not-allowed;
      filter:grayscale(1);
    }

    .controls{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin:12px 0;
    }

    .ghost{
      border:none;
      border-radius:13px;
      padding:11px 13px;
      font-weight:900;
      cursor:pointer;
      background:rgba(255,255,255,.08);
      color:var(--text);
      border:1px solid var(--line);
    }

    .log{
      display:grid;
      gap:8px;
      max-height:240px;
      overflow:auto;
      padding-right:4px;
    }

    .entry{
      padding:10px 11px;
      border-radius:14px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      color:#dbe5f2;
      font-size:12px;
      line-height:1.35;
    }

    .badgeRow{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
      justify-content:center;
    }

    .badge{
      padding:8px 10px;
      border-radius:999px;
      background:rgba(124,92,255,.17);
      border:1px solid rgba(124,92,255,.35);
      font-size:12px;
      color:#e9ebff;
    }

    .popup{
      position:fixed;
      left:50%;
      top:12%;
      transform:translateX(-50%);
      background:rgba(8,12,18,.92);
      border:1px solid rgba(255,255,255,.12);
      color:white;
      padding:13px 16px;
      border-radius:16px;
      font-weight:900;
      box-shadow:var(--shadow);
      opacity:0;
      z-index:30;
      animation:pop 2.3s ease forwards;
    }

    @keyframes pop{
      0%{opacity:0;transform:translateX(-50%) translateY(-10px)}
      12%{opacity:1;transform:translateX(-50%) translateY(0)}
      85%{opacity:1}
      100%{opacity:0;transform:translateX(-50%) translateY(-20px)}
    }

    .notif{
      position:fixed;
      right:18px;
      top:18px;
      min-width:230px;
      max-width:340px;
      background:rgba(18,24,35,.96);
      border:1px solid rgba(255,255,255,.09);
      border-radius:16px;
      padding:13px 14px;
      box-shadow:var(--shadow);
      z-index:29;
      animation:slideIn .35s ease-out;
    }

    @keyframes slideIn{
      from{transform:translateX(18px);opacity:0}
      to{transform:translateX(0);opacity:1}
    }

    .notif small{
      display:block;
      color:var(--muted);
      margin-top:4px;
    }

    .flash{
      position:fixed;
      inset:0;
      background:#fff;
      opacity:0;
      z-index:40;
      pointer-events:none;
    }

    .shake{animation:shake .33s linear infinite}
    @keyframes shake{
      0%{transform:translate(0,0)}
      25%{transform:translate(2px,-1px)}
      50%{transform:translate(-2px,1px)}
      75%{transform:translate(1px,2px)}
      100%{transform:translate(0,0)}
    }

    .spin{animation:spin 2.6s linear infinite}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

    .dvd{
      position:absolute;
      width:82px;
      height:46px;
      border:3px solid #fff;
      border-radius:12px;
      display:grid;
      place-items:center;
      font-weight:900;
      font-size:15px;
      color:#fff;
      background:rgba(255,255,255,.05);
      box-shadow:0 10px 25px rgba(0,0,0,.22);
      backdrop-filter:blur(5px);
    }

    .dvd span{letter-spacing:.08em}

    .panelReveal{
      display:none;
      padding:12px 0 0;
    }

    .panelReveal.show{display:block}

    .panelHint{
      padding:10px 12px;
      border-radius:14px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      color:#dbe5f2;
      font-size:12px;
      margin-top:10px;
    }

    .oceanScene{
      position:absolute;
      inset:0;
      opacity:0;
      pointer-events:none;
      transition:opacity .6s ease;
      overflow:hidden;
    }

    .oceanMode .oceanScene{opacity:1}
    .oceanSky{
      position:absolute;
      inset:0 0 35% 0;
      background:linear-gradient(180deg,#7dd3ff 0%,#4ebfff 45%,#1e8dd1 100%);
    }
    .oceanSea{
      position:absolute;
      left:0;right:0;bottom:0;height:42%;
      background:linear-gradient(180deg,#2f99de 0%,#0c6cad 60%,#074d82 100%);
      box-shadow:inset 0 18px 0 rgba(255,255,255,.08);
    }
    .oceanWave{
      position:absolute;
      bottom:26%;
      left:-10%;
      width:120%;
      height:36px;
      background:radial-gradient(circle at 20px 18px, rgba(255,255,255,.45) 0, rgba(255,255,255,.12) 28%, transparent 29%) 0 0/120px 36px repeat-x;
      opacity:.84;
      animation:wave 6s linear infinite;
    }
    @keyframes wave{
      from{transform:translateX(0)}
      to{transform:translateX(-120px)}
    }
    .oceanText{
      position:absolute;
      left:0;right:0;
      top:42%;
      text-align:center;
      color:#fff;
      font-size:clamp(26px,4vw,50px);
      font-weight:900;
      text-shadow:0 4px 20px rgba(0,0,0,.4);
      z-index:2;
    }
    .credits{
      position:absolute;
      left:50%;
      top:57%;
      transform:translateX(-50%);
      width:min(92vw,520px);
      text-align:center;
      font-size:15px;
      line-height:1.7;
      color:rgba(255,255,255,.88);
      z-index:2;
    }
    .credits .line{
      opacity:0;
      animation:fadeUp 1s ease forwards;
    }
    @keyframes fadeUp{
      from{opacity:0;transform:translateY(10px)}
      to{opacity:1;transform:translateY(0)}
    }
    .endButtons{
      position:absolute;
      left:50%;
      bottom:5%;
      transform:translateX(-50%);
      display:flex;
      gap:10px;
      z-index:3;
      pointer-events:auto;
      flex-wrap:wrap;
      justify-content:center;
    }
    .endBtn{
      border:none;
      border-radius:14px;
      padding:12px 16px;
      font-weight:900;
      cursor:pointer;
      background:rgba(255,255,255,.16);
      color:#fff;
      border:1px solid rgba(255,255,255,.18);
      backdrop-filter:blur(8px);
    }

    @media (max-width: 960px){
      .shell.show-side{grid-template-columns:1fr}
      .sidePanel{
        position:fixed;
        left:12px;right:12px;bottom:12px;top:auto;
        max-height:42vh;
      }
      .topbar{padding:0 2px}
    }
  </style>
</head>
<body>
  <div class="flash" id="flash"></div>
  <div class="app" id="app">
    <div class="topbar">
      <div class="brand">
        <div class="logo" id="logo">◎</div>
        <div>
          <h1 id="title">Stimulation Clicker</h1>
          <p class="sub" id="sub">Click me.</p>
        </div>
      </div>
      <div class="stats">
        <div class="chip">Stimulation: <span id="points">0</span></div>
        <div class="chip">SPS: <span id="sps">0</span></div>
        <div class="chip">Stage: <span id="stage">1</span></div>
      </div>
    </div>

    <div class="shell" id="shell">
      <div class="stage card mainCard" id="mainCard">
        <div class="center">
          <div class="floaters" id="floaters"></div>
          <div class="dvdLayer" id="dvdLayer"></div>
          <div class="chaosLayer" id="chaosLayer"></div>
          <div class="overlayLayer" id="overlayLayer"></div>
          <div class="titleLayer" id="titleLayer"></div>

          <div class="oceanScene" id="oceanScene">
            <div class="oceanSky"></div>
            <div class="oceanSea"></div>
            <div class="oceanWave"></div>
            <div class="oceanText">Go to the Ocean</div>
            <div class="credits" id="credits"></div>
            <div class="endButtons">
              <button class="endBtn" id="restartBtn">Restart</button>
            </div>
          </div>

          <button class="clicker" id="clicker">Click me</button>

          <div class="miniBar">
            <div class="miniCard">
              <div>Progress</div>
              <div>Level <span id="level">1</span></div>
              <div class="meter"><div class="bar" id="xpBar"></div></div>
            </div>
            <div class="miniCard">
              <div>Overload</div>
              <div id="overloadText">Barely anything is happening.</div>
              <div class="meter"><div class="bar" id="overBar"></div></div>
            </div>
          </div>
        </div>
      </div>

      <aside class="sidePanel" id="sidePanel">
        <h2 class="panelTitle">Upgrades</h2>
        <div class="panelGroup" id="shop"></div>

        <div class="controls">
          <button class="ghost" id="saveBtn">Save</button>
          <button class="ghost" id="resetBtn">Reset</button>
          <button class="ghost" id="soundBtn">Sound: On</button>
        </div>

        <div class="panelReveal" id="unlockArea">
          <div class="panelHint" id="unlockHint">Side panels unlock as you progress.</div>
        </div>

        <h2 class="panelTitle" style="margin-top:8px;">Activity Feed</h2>
        <div class="log" id="log"></div>
      </aside>
    </div>
  </div>

  <script>
    const SAVE_KEY = "stimulation_clicker_style_save_v3";

    const UPGRADE_DEFS = [
      ["dvd","Bouncing DVD",5,"Adds a bouncing DVD logo."],
      ["tab","Add Tab Title",5,"Adds stimulation to the browser title."],
      ["amount","Amount Animation",10,"Makes numbers pop on gain."],
      ["sps","SPS Counter",25,"Shows stimulation per second."],
      ["button","Button Upgrade",40,"Button gets stronger."],
      ["dvdsound","DVD Bounce Sound",75,"DVDs make sound when they bounce."],
      ["news","Breaking News",100,"Adds a news overlay."],
      ["subway","Subway Surfers",120,"Adds a moving distraction."],
      ["crit","Critical Hits",200,"Random clicks hit harder."],
      ["lofi","Lofi Beats",250,"Adds calm beats."],
      ["rain","Rain Sounds",300,"Adds rain ambience."],
      ["hydraulic","Hydraulic Press",1000,"Adds a press animation."],
      ["achievements","Achievements",1500,"Unlocks achievement panel."],
      ["screen","Screen Time",7500,"Adds a screen-time reminder."],
      ["stock","Stock Market",25000,"Adds a fake stock overlay."],
      ["duo","Duolingo",25000,"Adds lesson reminders."],
      ["med","Meditation",35000,"Brief calm mode."],
      ["twitch","Twitch Chat",500000,"Chat spam begins."],
      ["wormhole","Wormhole",1000000,"Space-time distraction."],
      ["ocean","Go to the Ocean",2000000,"End the chaos."]
    ];

    const state = {
      points: 0,
      sps: 0,
      clickValue: 1,
      multiplier: 1,
      critical: 1,
      level: 1,
      xp: 0,
      nextLevel: 25,
      stage: 1,
      totalClicks: 0,
      chaos: 0,
      sound: true,
      ocean: false,
      unlocked: {},
      upgrades: {},
      sideVisible: false
    };

    const el = id => document.getElementById(id);
    const fmt = n => Math.floor(n).toLocaleString();
    const rnd = arr => arr[Math.floor(Math.random() * arr.length)];
    const captions = [
      "Click me.",
      "Now click again.",
      "The screen is very normal.",
      "More stimulation incoming.",
      "This is probably too much.",
      "You should keep going.",
      "The internet is getting louder."
    ];

    let audioCtx = null;
    function beep(type="click"){
      if (!state.sound) return;
      try{
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === "suspended") audioCtx.resume();
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        if(type==="click"){
          o.type="square";
          o.frequency.setValueAtTime(500 + Math.random()*120, now);
          g.gain.setValueAtTime(0.0001, now);
          g.gain.exponentialRampToValueAtTime(0.08, now + 0.01);
          g.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
          o.start(now); o.stop(now + 0.09);
        }else if(type==="buy"){
          o.type="sine";
          o.frequency.setValueAtTime(280, now);
          o.frequency.exponentialRampToValueAtTime(680, now + 0.12);
          g.gain.setValueAtTime(0.0001, now);
          g.gain.exponentialRampToValueAtTime(0.1, now + 0.02);
          g.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
          o.start(now); o.stop(now + 0.2);
        }else{
          o.type="triangle";
          o.frequency.setValueAtTime(160 + Math.random()*80, now);
          g.gain.setValueAtTime(0.0001, now);
          g.gain.exponentialRampToValueAtTime(0.11, now + 0.01);
          g.gain.exponentialRampToValueAtTime(0.0001, now + 0.24);
          o.start(now); o.stop(now + 0.26);
        }
      }catch{}
    }

    function log(msg){
      const box = el("log");
      const d = document.createElement("div");
      d.className = "entry";
      d.textContent = msg;
      box.prepend(d);
      while(box.children.length > 7) box.removeChild(box.lastChild);
    }

    function popup(msg){
      const p = document.createElement("div");
      p.className = "popup";
      p.textContent = msg;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 2300);
    }

    function notif(title, text){
      const n = document.createElement("div");
      n.className = "notif";
      n.innerHTML = `<strong>${title}</strong><small>${text}</small>`;
      document.body.appendChild(n);
      setTimeout(() => {
        n.style.transition = "opacity .35s ease, transform .35s ease";
        n.style.opacity = "0";
        n.style.transform = "translateX(18px)";
        setTimeout(() => n.remove(), 380);
      }, 2400);
    }

    function floater(text, color){
      const f = document.createElement("div");
      f.className = "floater";
      f.textContent = text;
      f.style.left = (22 + Math.random()*56) + "%";
      f.style.top = (54 + Math.random()*18) + "%";
      f.style.color = color || rnd(["#7c5cff","#00d4ff","#00e676","#ffcc00","#ff5c7a"]);
      el("floaters").appendChild(f);
      setTimeout(() => f.remove(), 1100);
    }

    function flash(){
      const f = el("flash");
      f.style.transition = "none";
      f.style.opacity = "0";
      requestAnimationFrame(() => {
        f.style.transition = "opacity .08s linear";
        f.style.opacity = ".17";
        setTimeout(() => f.style.opacity = "0", 90);
      });
    }

    function save(){
      localStorage.setItem(SAVE_KEY, JSON.stringify(state));
    }

    function load(){
      const raw = localStorage.getItem(SAVE_KEY);
      if(!raw) return false;
      try{
        const data = JSON.parse(raw);
        Object.assign(state, data);
        state.unlocked = state.unlocked || {};
        state.upgrades = state.upgrades || {};
        return true;
      }catch{return false;}
    }

    function unlockSidePanel(msg){
      if(state.sideVisible) return;
      state.sideVisible = true;
      el("shell").classList.add("show-side");
      el("sidePanel").classList.add("show");
      el("unlockArea").classList.add("show");
      el("unlockHint").textContent = msg;
      popup(msg);
      notif("Side panel unlocked", msg);
    }

    function renderUnlocks(){
      const area = el("unlockArea");
      area.innerHTML = "";
      const triggers = [
        ["level3","The upgrade menu appears."],
        ["level6","A few distractions join the screen."],
        ["level12","Side chaos becomes visible."],
        ["level20","The page starts feeling crowded."]
      ];
      if(state.level >= 3){
        triggers.forEach((t,i)=>{
          if(state.level >= (i+1)*3 && !state.unlocked[t[0]]){
            state.unlocked[t[0]] = true;
            const c = document.createElement("div");
            c.className = "panelHint";
            c.textContent = t[1];
            area.appendChild(c);
          }
        });
      }else{
        const c = document.createElement("div");
        c.className = "panelHint";
        c.textContent = "Side panels unlock as you progress.";
        area.appendChild(c);
      }
    }

    function showSidePanelIfNeeded(){
      if(state.level >= 3 || state.upgrades.news || state.upgrades.subway || state.upgrades.lofi || state.upgrades.rain || state.upgrades.stock || state.upgrades.duo || state.upgrades.twitch){
        unlockSidePanel("The side panel has appeared.");
      }
    }

    function buy(key){
      const def = UPGRADE_DEFS.find(x => x[0] === key);
      if(!def || state.points < def[2] || state.ocean) return;
      state.points -= def[2];
      state.upgrades[key] = (state.upgrades[key] || 0) + 1;
      beep("buy");
      log("Bought " + def[1] + ".");
      applyUpgrade(key);
      update();
      renderShop();
      showSidePanelIfNeeded();
      save();
    }

    function applyUpgrade(key){
      state.chaos = Math.min(100, state.chaos + 3);
      if(key === "dvd") addDVD();
      if(key === "button") state.clickValue += 1;
      if(key === "sps") state.sps += 1;
      if(key === "news") showNews();
      if(key === "subway") showSubway(false);
      if(key === "crit") state.critical += 0.15;
      if(key === "lofi") showOverlayTag("Lofi Beats");
      if(key === "rain") showOverlayTag("Rain Sounds");
      if(key === "hydraulic") addHydraulic();
      if(key === "screen") notif("Screen Time", "You have been here for a while.");
      if(key === "stock") showStock();
      if(key === "duo") showDuolingo();
      if(key === "med") calmMode();
      if(key === "twitch") twitchChat();
      if(key === "wormhole") wormhole();
      if(key === "ocean") startOceanEnding();
      if(key === "achievements") log("Achievements unlocked.");
      if(key === "button") popup("Button upgraded.");
      if(key === "tab") document.title = "Stimulation: " + fmt(state.points);
    }

    function showOverlayTag(text){
      const d = document.createElement("div");
      d.className = "notif";
      d.style.right = "18px";
      d.style.top = "18px";
      d.textContent = text;
      document.body.appendChild(d);
      setTimeout(() => {
        d.style.transition = "opacity .35s ease, transform .35s ease";
        d.style.opacity = "0";
        d.style.transform = "translateX(18px)";
        setTimeout(() => d.remove(), 380);
      }, 2200);
    }

    function addDVD(){
      const d = document.createElement("div");
      d.className = "dvd";
      d.innerHTML = "<span>DVD</span>";
      d.style.left = (12 + Math.random()*56) + "%";
      d.style.top = (12 + Math.random()*42) + "%";
      d.dataset.vx = (1.2 + Math.random()*1.8) * (Math.random() < 0.5 ? -1 : 1);
      d.dataset.vy = (1.0 + Math.random()*1.6) * (Math.random() < 0.5 ? -1 : 1);
      el("dvdLayer").appendChild(d);
    }

    function moveDVDs(){
      [...el("dvdLayer").children].forEach(d => {
        const speed = 1 + (state.upgrades.dvdspeed1 ? 0.45 : 0) + (state.upgrades.dvdspeed2 ? 0.9 : 0);
        let x = parseFloat(d.style.left);
        let y = parseFloat(d.style.top);
        let vx = parseFloat(d.dataset.vx) * speed;
        let vy = parseFloat(d.dataset.vy) * speed;
        x += vx * 0.18;
        y += vy * 0.18;
        if(x < 1 || x > 85){
          vx *= -1;
          if(state.upgrades.dvdsound) beep("chaos");
        }
        if(y < 1 || y > 75){
          vy *= -1;
          if(state.upgrades.dvdsound) beep("chaos");
        }
        x = Math.max(1, Math.min(85, x));
        y = Math.max(1, Math.min(75, y));
        d.style.left = x + "%";
        d.style.top = y + "%";
        d.dataset.vx = vx;
        d.dataset.vy = vy;
      });
    }

    function addHydraulic(){
      const d = document.createElement("div");
      d.className = "notif";
      d.style.left = "50%";
      d.style.right = "auto";
      d.style.top = "18%";
      d.style.transform = "translateX(-50%)";
      d.textContent = "Hydraulic Press";
      document.body.appendChild(d);
      setTimeout(() => d.remove(), 9000);
    }

    function showNews(){
      notif("Breaking News", "Something extremely online just happened.");
    }

    function showSubway(full){
      const d = document.createElement("div");
      d.className = "notif";
      d.style.left = "50%";
      d.style.right = "auto";
      d.style.top = full ? "0" : "11%";
      d.style.transform = "translateX(-50%)";
      d.style.width = full ? "100%" : "280px";
      d.style.maxWidth = "none";
      d.style.height = full ? "100%" : "76px";
      d.style.display = "grid";
      d.style.placeItems = "center";
      d.style.borderRadius = full ? "0" : "16px";
      d.style.fontWeight = "900";
      d.style.fontSize = full ? "36px" : "24px";
      d.style.background = "linear-gradient(90deg, rgba(18,20,26,.88), rgba(36,42,60,.88))";
      d.textContent = "Subway Surfers";
      document.body.appendChild(d);
      setTimeout(() => d.remove(), full ? 12000 : 8000);
    }

    function showStock(){
      notif("Stock Market", "STONKS ↑ 12.4%");
    }

    function showDuolingo(){
      notif("Duolingo", "Your lesson is due.");
    }

    function calmMode(){
      notif("Meditation", "Breathe in. Breathe out.");
      state.chaos = Math.max(0, state.chaos - 18);
      document.body.style.filter = "saturate(.84) brightness(1.04)";
      setTimeout(() => document.body.style.filter = "none", 8000);
    }

    function twitchChat(){
      const d = document.createElement("div");
      d.className = "notif";
      d.style.left = "18px";
      d.style.right = "auto";
      d.style.bottom = "18px";
      d.style.top = "auto";
      d.innerHTML = "<strong>chat</strong><small>pog<br>W<br>no way<br>keep clicking</small>";
      document.body.appendChild(d);
      setTimeout(() => d.remove(), 12000);
    }

    function wormhole(){
      const d = document.createElement("div");
      d.className = "notif";
      d.style.left = "50%";
      d.style.top = "50%";
      d.style.right = "auto";
      d.style.transform = "translate(-50%,-50%)";
      d.style.width = "320px";
      d.style.height = "320px";
      d.style.borderRadius = "50%";
      d.style.background = "radial-gradient(circle, rgba(255,255,255,.95) 0, rgba(124,92,255,.8) 18%, rgba(0,212,255,.45) 40%, rgba(0,0,0,0) 72%)";
      d.style.filter = "blur(2px)";
      d.style.animation = "spin 1.6s linear infinite";
      document.body.appendChild(d);
      setTimeout(() => d.remove(), 12000);
    }

    function startOceanEnding(){
      state.ocean = true;
      el("clicker").style.display = "none";
      el("sidePanel").style.display = "none";
      el("shell").classList.remove("show-side");
      el("mainCard").classList.add("oceanMode");
      el("title").textContent = "Go to the Ocean";
      el("sub").textContent = "";
      el("hint").style.display = "none";
      el("app").style.background = "linear-gradient(180deg,#72d6ff 0%,#2a97de 38%,#0b5d9b 100%)";
      el("oceanScene").style.opacity = "1";
      el("oceanScene").style.pointerEvents = "auto";
      const lines = [
        "You made it to the ocean.",
        "The chaos is gone.",
        "Everything is quiet now.",
        "Thanks for playing."
      ];
      el("credits").innerHTML = lines.map((t,i)=>`<div class="line" style="animation-delay:${i*.85}s">${t}</div>`).join("");
      notif("Ending", "The screen has been calmed.");
      log("Reached the ocean ending.");
      save();
    }

    function renderShop(){
      const shop = el("shop");
      shop.innerHTML = "";
      UPGRADE_DEFS.forEach(def => {
        const [key, name, cost, desc] = def;
        const count = state.upgrades[key] || 0;
        const row = document.createElement("div");
        row.className = "upgrade";
        row.innerHTML = `
          <h3>${name}${count ? ` <span style="color:var(--muted);font-size:12px;">x${count}</span>` : ""}</h3>
          <p>${desc}</p>
          <button class="buy" ${state.points < cost || state.ocean ? "disabled" : ""}>Buy <span>${fmt(cost)}</span></button>
        `;
        row.querySelector("button").addEventListener("click", () => buy(key));
        shop.appendChild(row);
      });
    }

    function update(){
      el("points").textContent = fmt(state.points);
      el("sps").textContent = fmt(state.sps * state.multiplier);
      el("level").textContent = state.level;
      el("stage").textContent = state.stage;
      el("xpBar").style.width = (state.xp / state.nextLevel * 100) + "%";
      el("overBar").style.width = state.chaos + "%";
      el("overloadText").textContent =
        state.chaos < 20 ? "Barely anything is happening." :
        state.chaos < 45 ? "A few things are on the screen." :
        state.chaos < 70 ? "The page is getting crowded." :
        state.chaos < 90 ? "This is getting hard to look at." :
        "Peak overstimulation.";
      el("title").textContent = state.upgrades.tab ? "Stimulation Clicker" : "Stimulation";
      document.title = state.upgrades.tab ? "Stimulation: " + fmt(state.points) : "Stimulation";
      el("soundBtn").textContent = "Sound: " + (state.sound ? "On" : "Off");
      el("caption").textContent = rnd(captions);

      const badges = [];
      if(state.upgrades.dvd) badges.push("DVDs " + state.upgrades.dvd);
      if(state.upgrades.hydraulic) badges.push("Press " + state.upgrades.hydraulic);
      if(state.upgrades.lofi) badges.push("Lofi");
      if(state.upgrades.news) badges.push("News");
      if(state.upgrades.ocean) badges.push("Ocean");
      el("badgeRow")?.remove();
      const row = document.createElement("div");
      row.className = "badgeRow";
      row.id = "badgeRow";
      row.innerHTML = badges.map(b => `<div class="badge">${b}</div>`).join("");
      document.querySelector(".miniBar").appendChild(row);

      el("mainCard").classList.toggle("shake", state.chaos >= 85);
      el("logo").classList.toggle("spin", state.chaos >= 95);

      showSidePanelIfNeeded();
      renderUnlocks();
      renderShop();
      if(state.level >= 3) el("shell").classList.add("show-side");
    }

    function addPoints(n){
      if(state.ocean) return;
      state.points += n;
      state.xp += n;
      state.totalClicks++;
      while(state.xp >= state.nextLevel){
        state.xp -= state.nextLevel;
        state.level++;
        state.stage = Math.max(1, Math.floor(state.level / 3) + 1);
        state.nextLevel = Math.floor(state.nextLevel * 1.3 + 15);
        popup("Level up!");
      }
      if(state.level >= 3) unlockSidePanel("The side panel appeared.");
      if(state.level >= 12) el("shell").classList.add("show-side");
      save();
      update();
    }

    el("clicker").addEventListener("click", () => {
      if(state.ocean) return;
      const crit = Math.random() < 0.08;
      const gain = Math.max(1, Math.floor((state.clickValue * state.multiplier) * (crit ? 3 : 1)));
      addPoints(gain);
      floater("+" + fmt(gain), crit ? "#ffcc00" : null);
      beep("click");
      if(crit) { notif("Critical Hit", "Big stimulation."); beep("chaos"); }
      if(state.upgrades.news && Math.random() < 0.24) showNews();
      if(state.upgrades.screen && Math.random() < 0.12) notif("Screen Time", "Your screen time is now very high.");
      if(state.upgrades.subway) showSubway(state.upgrades.fullscreen);
      if(state.upgrades.stock) showStock();
      if(state.upgrades.duo) showDuolingo();
      if(state.upgrades.twitch) twitchChat();
      if(state.upgrades.wormhole) wormhole();
      if(Math.random() < 0.14) flash();
      if(Math.random() < 0.2) log("Clicked: " + rnd(["click", "tap", "press", "stimulate"]) + ".");
      if(Math.random() < 0.1) popup(rnd(["W", "pog", "based", "unhinged", "no way"]));
      if(state.upgrades.dvd) moveDVDs();
      if(state.upgrades.hydraulic && Math.random() < 0.2) addHydraulic();
      update();
    });

    function tick(){
      if(state.ocean) return;
      const income = state.sps * state.multiplier;
      if(income > 0){
        state.points += income;
        state.xp += income;
      }
      state.chaos = Math.max(0, Math.min(100, state.chaos + (Math.random() < 0.4 ? 0.5 : 0)));
      while(state.xp >= state.nextLevel){
        state.xp -= state.nextLevel;
        state.level++;
        state.stage = Math.max(1, Math.floor(state.level / 3) + 1);
        state.nextLevel = Math.floor(state.nextLevel * 1.3 + 15);
        popup("Level up!");
      }
      if(state.upgrades.dvd) moveDVDs();
      if(state.upgrades.lofi && Math.random() < 0.03) showOverlayTag("Lofi Beats");
      if(state.upgrades.rain && Math.random() < 0.03) showOverlayTag("Rain Sounds");
      if(state.upgrades.screen && Math.random() < 0.06) notif("Screen Time", "You have been here for a while.");
      if(state.upgrades.news && Math.random() < 0.05) showNews();
      renderUnlocks();
      update();
      save();
    }

    el("saveBtn").addEventListener("click", save);
    el("resetBtn").addEventListener("click", () => {
      if(confirm("Reset everything?")) {
        localStorage.removeItem(SAVE_KEY);
        location.reload();
      }
    });
    el("soundBtn").addEventListener("click", () => {
      state.sound = !state.sound;
      update();
      save();
    });
    el("restartBtn").addEventListener("click", () => {
      localStorage.removeItem(SAVE_KEY);
      location.reload();
    });

    function showOverlayTag(text){
      const d = document.createElement("div");
      d.className = "notif";
      d.style.left = "18px";
      d.style.right = "auto";
      d.style.top = "18px";
      d.textContent = text;
      document.body.appendChild(d);
      setTimeout(() => {
        d.style.transition = "opacity .35s ease, transform .35s ease";
        d.style.opacity = "0";
        d.style.transform = "translateX(-18px)";
        setTimeout(() => d.remove(), 380);
      }, 1800);
    }

    const loaded = load();
    if(loaded){
      notif("Loaded", "Saved progress restored.");
      log("Save loaded.");
    }else{
      log("Welcome to Stimulation Clicker.");
      log("Click the button.");
    }

    update();
    renderShop();
    renderUnlocks();
    setInterval(tick, 1000);
    setInterval(() => {
      if(state.upgrades.tab) document.title = "Stimulation: " + fmt(state.points);
    }, 1000);
  </script>
</body>
</html>
